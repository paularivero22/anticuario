[build]
builder = "nixpacks"

[build.nixpacksPlan.phases.setup]
nixPkgs = ["php83", "php83Packages.composer", "libmysqlclient"]

[build.nixpacksPlan.phases.install]
cmds = ["composer install --no-dev --optimize-autoloader"]

[build.nixpacksPlan.phases.build]
cmds = []

[deploy]
startCommand = "php artisan migrate --force && php artisan storage:link && php artisan serve --host=0.0.0.0 --port=$PORT"
restartPolicyType = "ON_FAILURE"

startCommand = "php artisan migrate --force && php artisan db:seed --force && php artisan storage:link && php artisan serve --host=0.0.0.0 --port=$PORT"